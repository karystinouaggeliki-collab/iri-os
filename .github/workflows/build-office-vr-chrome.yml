name: Build IRI Office VR Chrome

on:
  push:
    branches:
      - office-vr-chrome-build
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager 'platforms;android-34' 'build-tools;35.0.0'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Add build-time media assets
        run: |
          mkdir -p project/app/src/main/res/raw project/app/src/main/res/drawable-nodpi
          echo '' | base64 -d > project/app/src/main/res/drawable-nodpi/iri_office_360.jpg
          curl --fail --location --retry 4 \
            'https://raw.githubusercontent.com/karoldepka/ComRev/a4afe8c292b668261d1cd01644999832bd194c44/fe/assets/sounds/bulk-office-clean-up-amb-2-708140.mp3' \
            --output project/app/src/main/res/raw/office_rain.mp3
          test -s project/app/src/main/res/raw/office_rain.mp3

      - name: Build release APK
        run: gradle -p project :app:assembleRelease --no-daemon --stacktrace

      - name: Align unsigned APK
        run: |
          "$ANDROID_HOME/build-tools/35.0.0/zipalign" -p -f 4 \
            project/app/build/outputs/apk/release/app-release-unsigned.apk \
            IRI-Research-Office-VR-Chrome-2.0.0-aligned-unsigned.apk
          cp "$ANDROID_HOME/build-tools/35.0.0/lib/apksigner.jar" apksigner.jar
          cp "$ANDROID_HOME/build-tools/35.0.0/zipalign" zipalign
          cat > BUILD-VERIFICATION.txt <<'TXT'
          IRI Research Office VR Chrome 2.0.0
          Package: org.irikansas.researchoffice
          Version code: 3
          Browser architecture: real installed Chrome Custom Tab; no embedded WebView; no domain allowlist; no user-agent spoofing.
          Skybox: build-time placeholder, replaced and re-aligned before signing with the user-provided 360 panorama.
          Ambience: real CC0 field recording, Office clean up-AMB 2 by keahnpot.
          TXT
          sha256sum IRI-Research-Office-VR-Chrome-2.0.0-aligned-unsigned.apk > UNSIGNED-SHA256.txt

      - uses: actions/upload-artifact@v4
        with:
          name: IRI-Research-Office-VR-Chrome-2.0.0-build
          path: |
            IRI-Research-Office-VR-Chrome-2.0.0-aligned-unsigned.apk
            apksigner.jar
            zipalign
            BUILD-VERIFICATION.txt
            UNSIGNED-SHA256.txt
          compression-level: 0
          if-no-files-found: error
          retention-days: 7
